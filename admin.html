<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Diavolo Finishing — Admin</title>
<style>
:root{--fire:#c41100;--bg:#0c0808;--card:#161010;--border:#3a2020;--ash:#e8e0d8;--mist:#9a8a82;}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ash);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
a{color:var(--fire);}
.wrap{max-width:1000px;margin:0 auto;padding:24px 18px 80px;}
h1{font-size:22px;letter-spacing:.04em;margin:0;}
.muted{color:var(--mist);font-size:13px;}
input,textarea,select{width:100%;background:#0a0606;border:1px solid var(--border);color:var(--ash);border-radius:6px;padding:11px 12px;font-size:16px;font-family:inherit;}
input[type=checkbox]{width:auto;}
label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--mist);margin:10px 0 4px;}
button{cursor:pointer;border:none;border-radius:6px;padding:10px 16px;font-size:14px;font-weight:600;}
.btn{background:var(--fire);color:#fff;}
.btn:hover{background:#e2390f;}
.btn-ghost{background:transparent;color:var(--mist);border:1px solid var(--border);}
.btn-del{background:#2a1414;color:#ff7a6b;border:1px solid #4a2020;}
.hidden{display:none!important;}
/* login */
#login{max-width:380px;width:calc(100% - 32px);margin:10vh auto;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:28px;}
@media(max-width:600px){#login{padding:22px;margin:6vh auto;}.wrap{padding:18px 14px 80px;}}
#login h1{margin-bottom:4px;}
#loginErr{color:#ff7a6b;font-size:13px;min-height:18px;margin-top:8px;}
/* tabs */
.topbar{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
@media(max-width:600px){.tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px;}.tab{flex:0 0 auto;}}
.tab{background:var(--card);border:1px solid var(--border);color:var(--ash);font-size:13px;padding:9px 14px;border-radius:20px;}
.tab.active{background:var(--fire);color:#fff;border-color:var(--fire);}
.tab.back{background:transparent;color:var(--mist);border-color:var(--border);}
.tab.back:hover{color:var(--ash);}
.home{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px;}
@media(max-width:640px){.home{grid-template-columns:1fr;}}
.home-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:34px 24px;text-align:center;cursor:pointer;transition:border-color .15s,transform .15s;}
.home-card:hover{border-color:var(--fire);transform:translateY(-2px);}
.hc-ico{font-size:42px;line-height:1;margin-bottom:12px;}
.hc-t{font-size:22px;font-weight:700;color:var(--ash);margin-bottom:6px;}
.hc-s{font-size:13px;color:var(--mist);max-width:240px;margin:0 auto;line-height:1.4;}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;}
/* orders list */
.ord-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
.ord-search{flex:1;min-width:200px;}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;overflow-x:auto;}
.chip{background:var(--card);border:1px solid var(--border);color:var(--ash);font-size:12px;padding:7px 12px;border-radius:16px;cursor:pointer;white-space:nowrap;}
.chip.active{background:var(--fire);border-color:var(--fire);color:#fff;}
.chip .n{opacity:.65;margin-left:5px;font-weight:400;}
.ord{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:var(--card);overflow:hidden;}
.ord-row{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;}
.ord-row:hover{background:#1c1414;}
.ord-main{flex:1;min-width:0;}
.ord-num{font-weight:700;color:var(--ash);font-size:14px;}
.ord-sub{color:var(--mist);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ord-right{text-align:right;white-space:nowrap;}
.ord-amt{font-weight:700;color:var(--ash);font-size:14px;}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px;line-height:1.4;}
.chev{color:var(--mist);transition:transform .15s;font-size:12px;}
.ord.open .chev{transform:rotate(180deg);}
.ord-detail{border-top:1px solid var(--border);padding:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:600px){.row2,.row3{grid-template-columns:1fr;}}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.thumb{height:60px;border-radius:5px;border:1px solid var(--border);margin-top:6px;background:#000;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#16320f;border:1px solid #2e6b1c;color:#bfe; padding:12px 20px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .25s;z-index:50;}
.toast.show{opacity:1;}
.section-actions{margin:0 0 16px;}
.saving{opacity:.5;pointer-events:none;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h1>Diavolo <span style="color:var(--fire)">Admin</span></h1>
  <p class="muted">Sign in to manage your site.</p>
  <label>Email</label>
  <input id="email" type="email" inputmode="email" autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="username" value="diavolo.finishing@gmail.com">
  <label>Password</label>
  <input id="password" type="password" autocomplete="current-password">
  <div id="loginErr"></div>
  <button class="btn" style="width:100%;margin-top:14px" id="loginBtn">Sign In</button>
</div>

<!-- DASHBOARD -->
<div id="dash" class="wrap hidden">
  <div class="topbar">
    <div><h1>Diavolo <span style="color:var(--fire)">Admin</span></h1><div class="muted" id="who"></div></div>
    <button class="btn-ghost" id="logoutBtn">Log out</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="panel"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://geqcmsanojmucaiysmaf.supabase.co';
const SB_KEY='sb_publishable_8zWY_Evi24ru1K3UebA1lQ_eYC21ecy';
const sb=supabase.createClient(SB_URL,SB_KEY);

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

// ---- Auth ----
const loginBtn=document.getElementById('loginBtn');
loginBtn.addEventListener('click',async function(){
  document.getElementById('loginErr').textContent='';
  loginBtn.disabled=true;loginBtn.textContent='Signing in...';
  try{
    var em=(document.getElementById('email').value||'').trim().toLowerCase();
    var pw=document.getElementById('password').value||'';
    if(!em||!pw){document.getElementById('loginErr').textContent='Enter your email and password.';return;}
    var {error}=await sb.auth.signInWithPassword({email:em,password:pw});
    if(error){document.getElementById('loginErr').textContent=error.message;return;}
    showDash();
  }catch(e){
    document.getElementById('loginErr').textContent='Could not sign in: '+(e&&e.message?e.message:'network error');
  }finally{
    loginBtn.disabled=false;loginBtn.textContent='Sign In';
  }
});
document.getElementById('password').addEventListener('keydown',function(e){if(e.key==='Enter')loginBtn.click();});
document.getElementById('logoutBtn').addEventListener('click',async function(){await sb.auth.signOut();location.reload();});

async function showDash(){
  var {data}=await sb.auth.getUser();
  if(!data||!data.user){return;}
  document.getElementById('login').classList.add('hidden');
  document.getElementById('dash').classList.remove('hidden');
  document.getElementById('who').textContent=data.user.email;
  goHome();
}

// ---- Config ----
const TABS=[
  {key:'orders',label:'📋 Orders'},
  {key:'settings',label:'Contact & Hours'},
  {key:'services',label:'Services'},
  {key:'reviews',label:'Reviews'},
  {key:'colors',label:'Colors'},
  {key:'gallery',label:'Gallery'},
  {key:'before_after',label:'Before / After'},
  {key:'videos',label:'Videos'}
];
const SETTING_FIELDS=[
  {key:'phone',label:'Phone'},
  {key:'address',label:'Shop Address'},
  {key:'hours',label:'Hours'},
  {key:'instagram',label:'Instagram handle'},
  {key:'email',label:'Contact Email'},
  {key:'payment_note',label:'Payment note'}
];
const LISTS={
  services:{order:'sort',fields:[
    {k:'title',t:'text',l:'Title'},{k:'description',t:'textarea',l:'Description'},
    {k:'sort',t:'number',l:'Order'},{k:'active',t:'bool',l:'Show'}]},
  reviews:{order:'sort',fields:[
    {k:'author',t:'text',l:'Customer name'},{k:'body',t:'textarea',l:'Review'},
    {k:'rating',t:'number',l:'Stars (1-5)'},{k:'sort',t:'number',l:'Order'},{k:'active',t:'bool',l:'Show'}]},
  colors:{order:'sort',fields:[
    {k:'name',t:'text',l:'Color name'},{k:'hex',t:'text',l:'Hex (#000000)'},
    {k:'kind',t:'text',l:'Type'},{k:'approx',t:'bool',l:'Approx'},
    {k:'sort',t:'number',l:'Order'},{k:'active',t:'bool',l:'Show'}]},
  gallery:{order:'sort',fields:[
    {k:'image_url',t:'image',l:'Photo'},{k:'caption',t:'text',l:'Caption'},
    {k:'sort',t:'number',l:'Order'},{k:'active',t:'bool',l:'Show'}]},
  before_after:{order:'sort',fields:[
    {k:'before_url',t:'image',l:'Before photo'},{k:'after_url',t:'image',l:'After photo'},
    {k:'caption',t:'text',l:'Caption'},{k:'sort',t:'number',l:'Order'},{k:'active',t:'bool',l:'Show'}]},
  videos:{order:'sort',fields:[
    {k:'video_url',t:'video',l:'Video file (mp4)'},
    {k:'poster_url',t:'image',l:'Thumbnail (shown before play)'},
    {k:'aspect',t:'select',l:'Aspect ratio',opts:['16:9','9:16','1:1','4:3']},
    {k:'caption',t:'text',l:'Caption'},{k:'sort',t:'number',l:'Order'},{k:'active',t:'bool',l:'Show'}]}
};

// ---- Two-level navigation: Home → (Orders | Edit Website) ----
function goHome(){
  document.getElementById('tabs').innerHTML='';
  var p=document.getElementById('panel');
  p.innerHTML='<div class="home">'
    +'<button class="home-card" data-go="orders"><div class="hc-ico">📋</div><div class="hc-t">Orders</div><div class="hc-s">View &amp; manage customer quote requests</div></button>'
    +'<button class="home-card" data-go="editor"><div class="hc-ico">🛠️</div><div class="hc-t">Edit Website</div><div class="hc-s">Contact, services, reviews, colors, gallery, before/after &amp; videos</div></button>'
    +'</div>';
  p.querySelector('[data-go="orders"]').onclick=openOrders;
  p.querySelector('[data-go="editor"]').onclick=openEditor;
}
function backBtn(){var b=document.createElement('button');b.className='tab back';b.textContent='← Home';b.onclick=goHome;return b;}
function openOrders(){
  var c=document.getElementById('tabs');c.innerHTML='';
  c.appendChild(backBtn());
  renderOrders();
}
function openEditor(){
  var c=document.getElementById('tabs');c.innerHTML='';
  c.appendChild(backBtn());
  TABS.forEach(function(t){
    if(t.key==='orders')return;
    var b=document.createElement('button');b.className='tab';b.textContent=t.label;b.dataset.key=t.key;
    b.onclick=function(){selectTab(t.key);};
    c.appendChild(b);
  });
  selectTab('settings');
}
function selectTab(key){
  [].forEach.call(document.querySelectorAll('.tab'),function(b){b.classList.toggle('active',b.dataset.key===key);});
  if(key==='settings')renderSettings();else renderList(key);
}

// ---- Settings editor ----
async function renderSettings(){
  var p=document.getElementById('panel');p.innerHTML='<div class="muted">Loading…</div>';
  var {data}=await sb.from('settings').select('*');
  var map={};(data||[]).forEach(function(r){map[r.key]=r.value;});
  var html='<div class="card"><div class="card-head"><b>Contact & Hours</b></div>';
  SETTING_FIELDS.forEach(function(f){
    html+='<label>'+f.label+'</label><input data-skey="'+f.key+'" value="'+(map[f.key]?String(map[f.key]).replace(/"/g,'&quot;'):'')+'">';
  });
  html+='<button class="btn" style="margin-top:16px" id="saveSettings">Save</button></div>';
  p.innerHTML=html;
  document.getElementById('saveSettings').onclick=async function(){
    this.classList.add('saving');
    var rows=[].map.call(document.querySelectorAll('[data-skey]'),function(i){return {key:i.dataset.skey,value:i.value};});
    var {error}=await sb.from('settings').upsert(rows,{onConflict:'key'});
    this.classList.remove('saving');
    toast(error?('Error: '+error.message):'Saved ✓');
  };
}

// ---- Generic list editor ----
async function renderList(table){
  var cfg=LISTS[table];var p=document.getElementById('panel');p.innerHTML='<div class="muted">Loading…</div>';
  var {data,error}=await sb.from(table).select('*').order(cfg.order,{ascending:true});
  if(error){p.innerHTML='<div class="muted">Error: '+error.message+'</div>';return;}
  var html='<div class="section-actions"><button class="btn" id="addNew">+ Add new</button></div>';
  (data||[]).forEach(function(row){html+=cardHtml(table,cfg,row);});
  p.innerHTML=html;
  document.getElementById('addNew').onclick=async function(){
    var blank={};cfg.fields.forEach(function(f){blank[f.k]=f.t==='bool'?true:(f.t==='number'?0:'');});
    var {error}=await sb.from(table).insert(blank);
    if(error){toast('Error: '+error.message);return;}
    renderList(table);
  };
  bindCards(table,cfg);
}
function cardHtml(table,cfg,row){
  var h='<div class="card" data-id="'+row.id+'"><div class="row2">';
  cfg.fields.forEach(function(f){
    h+='<div>';
    h+='<label>'+f.l+'</label>';
    if(f.t==='textarea')h+='<textarea data-f="'+f.k+'" rows="3">'+(row[f.k]||'')+'</textarea>';
    else if(f.t==='bool')h+='<input type="checkbox" data-f="'+f.k+'" '+(row[f.k]?'checked':'')+'>';
    else if(f.t==='number')h+='<input type="number" data-f="'+f.k+'" value="'+(row[f.k]==null?0:row[f.k])+'">';
    else if(f.t==='image'){
      h+='<input type="hidden" data-f="'+f.k+'" value="'+(row[f.k]||'')+'">';
      h+='<input type="file" accept="image/*" data-upload="'+f.k+'">';
      h+='<img class="thumb '+(row[f.k]?'':'hidden')+'" data-prev="'+f.k+'" src="'+(row[f.k]||'')+'">';
    }
    else if(f.t==='video'){
      h+='<input type="hidden" data-f="'+f.k+'" value="'+(row[f.k]||'')+'">';
      h+='<input type="file" accept="video/*" data-upload="'+f.k+'">';
      h+='<video class="thumb '+(row[f.k]?'':'hidden')+'" data-prev="'+f.k+'" src="'+(row[f.k]||'')+'" muted playsinline controls style="height:90px;width:auto"></video>';
    }
    else if(f.t==='select'){
      h+='<select data-f="'+f.k+'">'+(f.opts||[]).map(function(o){return '<option '+(String(row[f.k])===o?'selected':'')+'>'+o+'</option>';}).join('')+'</select>';
    }
    else h+='<input data-f="'+f.k+'" value="'+(row[f.k]?String(row[f.k]).replace(/"/g,'&quot;'):'')+'">';
    h+='</div>';
  });
  h+='</div><div style="margin-top:12px;display:flex;gap:8px"><button class="btn" data-save>Save</button><button class="btn-del" data-delete>Delete</button></div></div>';
  return h;
}
function bindCards(table,cfg){
  [].forEach.call(document.querySelectorAll('#panel .card'),function(card){
    var id=card.dataset.id;
    // image uploads
    [].forEach.call(card.querySelectorAll('[data-upload]'),function(fi){
      fi.addEventListener('change',async function(){
        var file=fi.files[0];if(!file)return;
        toast('Uploading…');
        var ext=((file.name||'').split('.').pop()||'bin').toLowerCase();
        var path=table+'/'+id+'_'+fi.dataset.upload+'_'+Date.now()+'.'+ext;
        var {error}=await sb.storage.from('site-images').upload(path,file,{upsert:true,contentType:file.type});
        if(error){toast('Upload error: '+error.message);return;}
        var {data}=sb.storage.from('site-images').getPublicUrl(path);
        var url=data.publicUrl;
        card.querySelector('[data-f="'+fi.dataset.upload+'"]').value=url;
        var prev=card.querySelector('[data-prev="'+fi.dataset.upload+'"]');prev.src=url;prev.classList.remove('hidden');
        toast('Photo uploaded ✓ — click Save');
      });
    });
    card.querySelector('[data-save]').onclick=async function(){
      this.classList.add('saving');
      var patch={};
      [].forEach.call(card.querySelectorAll('[data-f]'),function(i){
        var f=cfg.fields.find(function(x){return x.k===i.dataset.f;});
        if(f.t==='bool')patch[f.k]=i.checked;
        else if(f.t==='number')patch[f.k]=i.value===''?null:Number(i.value);
        else patch[f.k]=i.value;
      });
      var {error}=await sb.from(table).update(patch).eq('id',id);
      this.classList.remove('saving');
      toast(error?('Error: '+error.message):'Saved ✓');
    };
    card.querySelector('[data-delete]').onclick=async function(){
      if(!confirm('Delete this item?'))return;
      var {error}=await sb.from(table).delete().eq('id',id);
      if(error){toast('Error: '+error.message);return;}
      card.remove();toast('Deleted');
    };
  });
}

// ---- Orders dashboard ----
var ORDER_STATUSES=['New','Contacted','Quoted','In Progress','Done'];
var ORDERS={};
function eT(s){var d=document.createElement('div');d.textContent=(s==null?'':s);return d.innerHTML;}
function eA(s){return String(s==null?'':s).replace(/"/g,'&quot;');}
async function callInvoiceFn(payload){
  var s=await sb.auth.getSession();
  var tok=s.data&&s.data.session?s.data.session.access_token:'';
  try{
    var r=await fetch(SB_URL+'/functions/v1/stripe-invoice',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok,'apikey':SB_KEY},body:JSON.stringify(payload)});
    return await r.json();
  }catch(e){return {error:String(e.message||e)};}
}
var ORDER_LIST=[];
var ORD_FILTER='All';
var ORD_SEARCH='';
function chargeLabel(ct){return ct==='Deposit 50%'?'50% deposit':ct==='Deposit 25%'?'25% deposit':ct==='Balance remaining'?'Remaining balance':'Full payment';}
function jobDetails(o){var p=[];if(o.quantity)p.push(o.quantity+'×');if(o.wheel_size)p.push(o.wheel_size+(o.wheel_size.indexOf('"')<0?'"':''));if(o.finish)p.push(o.finish);if(o.color)p.push(o.color);return p.join(' · ');}
function invoiceDesc(o,ct){var d='Diavolo Finishing — '+(o.order_number||'Order')+' — '+chargeLabel(ct);var jd=jobDetails(o);if(jd)d+='. '+jd;if(o.message)d+='. Note: '+o.message;return d.slice(0,480);}
function digitsPhone(p){var d=(p||'').replace(/[^0-9]/g,'');if(d.length===10)return '+1'+d;if(d.length===11&&d[0]==='1')return '+'+d;return d?('+'+d):'';}
function statusColors(s){return ({'New':['#3a1410','#ff7a6b'],'Contacted':['#3a2c10','#e0a000'],'Quoted':['#102a3a','#5bb0e0'],'In Progress':['#2a1038','#b07ae0'],'Done':['#103a1c','#3ecf8e']})[s]||['#222','#999'];}
function statusBadge(s){var c=statusColors(s);return '<span class="badge" style="background:'+c[0]+';color:'+c[1]+'">'+eT(s||'New')+'</span>';}
function invBadge(st){
  if(!st)return '';
  if(st==='paid')return '<div class="badge" style="background:#103a1c;color:#3ecf8e;margin-top:4px">Paid</div>';
  if(st==='void')return '<div class="badge" style="background:#241616;color:#9a8a82;margin-top:4px">Void</div>';
  return '<div class="badge" style="background:#3a2c10;color:#e0a000;margin-top:4px">Unpaid</div>';
}
function genOrderNo(){var d=new Date();function p(n){return ('0'+n).slice(-2);}return 'DF-'+String(d.getFullYear()).slice(2)+p(d.getMonth()+1)+p(d.getDate())+'-'+Math.floor(1000+Math.random()*9000);}
async function renderOrders(){
  var p=document.getElementById('panel'); p.innerHTML='<div class="muted">Loading…</div>';
  var r=await sb.from('orders').select('*').order('created_at',{ascending:false});
  if(r.error){p.innerHTML='<div class="muted">Error: '+r.error.message+'</div>';return;}
  ORDER_LIST=r.data||[]; ORDERS={}; ORDER_LIST.forEach(function(o){ORDERS[o.id]=o;});
  p.innerHTML=orderToolbar()+'<div id="ordList"></div>';
  bindToolbar();
  renderOrderList();
}
function orderToolbar(){
  var counts={All:ORDER_LIST.length}; ORDER_STATUSES.forEach(function(s){counts[s]=0;});
  ORDER_LIST.forEach(function(o){counts[o.status]=(counts[o.status]||0)+1;});
  var chips=['All'].concat(ORDER_STATUSES).map(function(s){
    return '<button class="chip'+(ORD_FILTER===s?' active':'')+'" data-filter="'+eA(s)+'">'+eT(s)+'<span class="n">'+(counts[s]||0)+'</span></button>';
  }).join('');
  return '<div class="ord-toolbar">'
      +'<input class="ord-search" id="ordSearch" placeholder="Search name, phone, order #, color…" value="'+eA(ORD_SEARCH)+'">'
      +'<button class="btn-ghost" id="refreshBtn" style="white-space:nowrap" title="Check for new orders">↻ Refresh</button>'
      +'<button class="btn" id="newInvBtn" style="white-space:nowrap">+ New invoice</button>'
    +'</div>'
    +'<div id="newInvForm" class="card hidden">'
      +'<b style="font-size:15px">Create an invoice</b>'
      +'<div class="muted" style="margin:2px 0 10px">For a walk-in or phone customer. This creates an order and a Stripe invoice.</div>'
      +'<div class="row2">'
        +'<div><label>Customer name *</label><input id="niName"></div>'
        +'<div><label>Email *</label><input id="niEmail" type="email" inputmode="email" autocapitalize="none" autocorrect="off"></div>'
        +'<div><label>Phone</label><input id="niPhone" type="tel"></div>'
        +'<div><label>Amount ($) *</label><input id="niAmount" type="number" step="0.01" min="0" placeholder="e.g. 400"></div>'
        +'<div><label>Quantity</label><input id="niQty" type="number" min="1" placeholder="e.g. 4"></div>'
        +'<div><label>Status</label><select id="niStatus">'+ORDER_STATUSES.map(function(s){return '<option'+(s==='Quoted'?' selected':'')+'>'+s+'</option>';}).join('')+'</select></div>'
      +'</div>'
      +'<label>What it\'s for</label><input id="niDesc" placeholder="e.g. Powder coating wheels — gloss black">'
      +'<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">'
        +'<button class="btn" id="niCreate">Create &amp; send invoice</button>'
        +'<button class="tab" id="niCancel">Cancel</button>'
      +'</div>'
      +'<div class="muted" id="niMsg" style="margin-top:8px;min-height:16px"></div>'
    +'</div>'
    +'<div class="chips">'+chips+'</div>';
}
function bindToolbar(){
  var se=document.getElementById('ordSearch');
  if(se)se.addEventListener('input',function(){ORD_SEARCH=se.value;renderOrderList();});
  [].forEach.call(document.querySelectorAll('.chip[data-filter]'),function(c){
    c.onclick=function(){ORD_FILTER=c.dataset.filter;[].forEach.call(document.querySelectorAll('.chip[data-filter]'),function(x){x.classList.toggle('active',x===c);});renderOrderList();};
  });
  var rb=document.getElementById('refreshBtn');
  if(rb)rb.onclick=async function(){
    rb.disabled=true;rb.textContent='↻ Syncing…';
    try{
      var r=await sb.from('orders').select('id,invoice_id,invoice_status').not('invoice_id','is',null);
      var pend=(r.data||[]).filter(function(o){return o.invoice_id && o.invoice_status!=='paid' && o.invoice_status!=='void';});
      await Promise.all(pend.map(function(o){return callInvoiceFn({action:'status',order_id:o.id,invoice_id:o.invoice_id});}));
    }catch(e){}
    rb.disabled=false;
    await renderOrders();
    toast('Refreshed ✓');
  };
  var nb=document.getElementById('newInvBtn'), nf=document.getElementById('newInvForm');
  if(nb)nb.onclick=function(){nf.classList.toggle('hidden');if(!nf.classList.contains('hidden'))document.getElementById('niName').focus();};
  var nc=document.getElementById('niCancel');
  if(nc)nc.onclick=function(){nf.classList.add('hidden');};
  var nCreate=document.getElementById('niCreate');
  if(nCreate)nCreate.onclick=async function(){
    function v(id){return (document.getElementById(id).value||'').trim();}
    var name=v('niName'), email=v('niEmail').toLowerCase(), phone=v('niPhone'), desc=v('niDesc'), amount=parseFloat(v('niAmount'))||0;
    var qty=parseInt(v('niQty'),10); if(isNaN(qty))qty=null;
    var status=(document.getElementById('niStatus')||{}).value||'Quoted';
    var msg=document.getElementById('niMsg');
    if(!name||!email||amount<0.5){msg.style.color='#ff7a6b';msg.textContent='Enter customer name, email, and an amount of at least $0.50.';return;}
    nCreate.disabled=true;var old=nCreate.textContent;nCreate.textContent='Creating…';msg.style.color='';msg.textContent='';
    var on=genOrderNo();
    var ins=await sb.from('orders').insert({order_number:on,name:name,email:email,phone:phone,quantity:qty,message:desc,status:status,price:amount,amount_due:amount,charge_type:'Full amount'}).select();
    if(ins.error){nCreate.disabled=false;nCreate.textContent=old;msg.style.color='#ff7a6b';msg.textContent='Error: '+ins.error.message;return;}
    var id=ins.data[0].id;
    var fullDesc=invoiceDesc({order_number:on,quantity:qty,message:desc},'Full amount');
    var res=await callInvoiceFn({action:'create',order_id:id,amount_cents:Math.round(amount*100),email:email,name:name,description:fullDesc,charge_type:'Full amount',price:amount});
    nCreate.disabled=false;nCreate.textContent=old;
    if(res&&res.error){toast('Invoice error: '+res.error);}
    else{toast(res.emailed?('Invoice emailed to '+email+' ✓'):'Invoice created ✓ — open the order to copy the link');}
    ['niName','niEmail','niPhone','niDesc','niAmount'].forEach(function(i){document.getElementById(i).value='';});
    nf.classList.add('hidden');
    renderOrders();
  };
}
function renderOrderList(){
  var c=document.getElementById('ordList'); if(!c)return;
  var term=ORD_SEARCH.trim().toLowerCase();
  var rows=ORDER_LIST.filter(function(o){
    if(ORD_FILTER!=='All' && (o.status||'New')!==ORD_FILTER) return false;
    if(term){var hay=((o.order_number||'')+' '+(o.name||'')+' '+(o.phone||'')+' '+(o.email||'')+' '+(o.color||'')).toLowerCase();if(hay.indexOf(term)<0)return false;}
    return true;
  });
  if(rows.length){c.innerHTML=rows.map(orderRow).join('');}
  else if(!ORDER_LIST.length){c.innerHTML='<div class="muted">No orders yet. Website quote requests appear here automatically — or use “+ New invoice” to bill a customer directly.</div>';}
  else{c.innerHTML='<div class="muted">No matching orders.</div>';}
  bindOrders();
}
function orderRow(o){
  var dt=new Date(o.created_at); var when=dt.toLocaleDateString([], {month:'short',day:'numeric'});
  var meta=[o.name,o.wheel_size,o.finish,o.color].filter(Boolean).join(' · ')||'—';
  var right=(o.amount_due!=null?('<div class="ord-amt">$'+Number(o.amount_due).toFixed(2)+'</div>'):'')+(o.invoice_url?invBadge(o.invoice_status):'');
  return '<div class="ord" data-id="'+o.id+'">'
    +'<div class="ord-row" data-toggle>'
      +statusBadge(o.status)
      +'<div class="ord-main"><div class="ord-num">'+eT(o.order_number||('#'+o.id))+'</div><div class="ord-sub">'+eT(meta)+'</div></div>'
      +'<div class="ord-right"><div class="ord-sub" style="margin:0">'+when+'</div>'+right+'</div>'
      +'<span class="chev">▾</span>'
    +'</div>'
    +'<div class="ord-detail hidden">'+orderDetail(o)+'</div>'
  +'</div>';
}
function orderDetail(o){
  var opts=ORDER_STATUSES.map(function(s){return '<option '+(o.status===s?'selected':'')+'>'+s+'</option>';}).join('');
  var photo=o.photo_url?'<a href="'+eA(o.photo_url)+'" target="_blank"><img src="'+eA(o.photo_url)+'" class="thumb" style="height:130px"></a>':'<span class="muted">No photo</span>';
  return '<label>Status</label><select data-of="status">'+opts+'</select>'
    +'<div class="row2" style="margin-top:10px">'
      +'<div><label>Name</label><div>'+eT(o.name||'—')+'</div></div>'
      +'<div><label>Phone</label><div><a href="tel:'+eA(o.phone)+'">'+eT(o.phone||'—')+'</a></div></div>'
      +'<div><label>Email</label><div>'+eT(o.email||'—')+'</div></div>'
      +'<div><label>Wheel size</label><div>'+eT(o.wheel_size||'—')+'</div></div>'
      +'<div><label>Quantity</label><div>'+eT(o.quantity!=null?o.quantity:'—')+'</div></div>'
      +'<div><label>Finish</label><div>'+eT(o.finish||'—')+'</div></div>'
      +'<div><label>Color</label><div>'+eT(o.color||'—')+'</div></div>'
    +'</div>'
    +'<label>Message</label><div class="muted">'+eT(o.message||'—')+'</div>'
    +'<label>Photo</label><div>'+photo+'</div>'
    +'<div style="border-top:1px solid var(--border);margin:14px 0 8px"></div>'
    +'<label>💳 Payment</label>'
    +payBlock(o)
    +'<label style="margin-top:12px;display:block">Internal notes</label><textarea data-of="notes" rows="2">'+eT(o.notes||'')+'</textarea>'
    +'<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">'
      +'<button class="btn" data-save-order>Save</button>'
      +(o.status!=='Done'?'<button class="tab" data-mark-done style="border-color:#2e6b1c;color:#3ecf8e">✓ Mark Done</button>':'<span class="badge" style="background:#103a1c;color:#3ecf8e;align-self:center">Done ✓</span>')
    +'</div>';
}
function payBlock(o){
  var price=o.price!=null?o.price:'';
  var amt=o.amount_due!=null?o.amount_due:'';
  var ct=o.charge_type||'Full amount';
  var sel=['Full amount','Deposit 50%','Deposit 25%','Balance remaining','Custom'].map(function(s){return '<option '+(ct===s?'selected':'')+'>'+s+'</option>';}).join('');
  var total=Number(o.price)||0, paid=Number(o.paid_total)||0, balance=total>0?Math.max(0,total-paid):0;
  var summary='';
  if(total>0 && paid>0){
    var fully=balance<=0.005;
    summary='<div style="margin-top:10px;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;line-height:1.7">'
      +'Job total: <b>$'+total.toFixed(2)+'</b> &nbsp;·&nbsp; Paid so far: <b style="color:#3ecf8e">$'+paid.toFixed(2)+'</b><br>'
      +'Balance: <b style="color:'+(fully?'#3ecf8e':'#e0a000')+'">$'+balance.toFixed(2)+(fully?' — paid in full ✓':' — unpaid')+'</b>'
      +(fully?'':(' <button class="btn" data-bill-balance data-bal="'+balance.toFixed(2)+'" style="margin-left:8px;padding:6px 12px">Invoice the balance</button>'))
      +'</div>';
  }
  var invHtml='';
  if(o.invoice_url){
    var st=o.invoice_status||'open';
    var label=st==='paid'?'PAID ✓':(st==='void'?'Voided':'Sent — awaiting payment');
    var color=st==='paid'?'#3ecf8e':(st==='void'?'var(--mist)':'#e0a000');
    var textBtn='';
    if(o.phone){
      var opl=chargeLabel(o.charge_type||'Full amount');
      var amt2=o.amount_due!=null?Number(o.amount_due).toFixed(2):'';
      var body='Hi '+(o.name||'')+' — Diavolo Finishing here. Your '+opl+' invoice'+(o.order_number?(' for '+o.order_number):'')+' is $'+amt2+'. Pay securely by card: '+o.invoice_url+' . Thank you!';
      var href='sms:'+digitsPhone(o.phone)+'?&body='+encodeURIComponent(body);
      textBtn='<a class="tab" href="'+eA(href)+'" data-text-log style="background:#10261a;border-color:#2e6b1c;color:#9be8c0">💬 Text customer</a>';
    }
    var textedNote=o.last_texted?('<div class="muted" style="margin-top:6px">Texted ✓ '+eT(new Date(o.last_texted).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}))+'</div>'):'';
    invHtml='<div style="margin-top:10px;padding:10px;border:1px solid var(--border);border-radius:6px">'
      +'<div>Invoice status: <b style="color:'+color+'">'+label+'</b>'+(o.amount_due!=null?(' &nbsp;($'+Number(o.amount_due).toFixed(2)+')'):'')+'</div>'
      +'<div style="margin-top:6px"><a href="'+eA(o.invoice_url)+'" target="_blank">View / pay invoice ↗</a></div>'
      +'<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">'
        +textBtn
        +'<button class="tab" data-inv-copy data-url="'+eA(o.invoice_url)+'">Copy link</button>'
        +'<button class="tab" data-inv-refresh>Refresh status</button>'
        +((st!=='void'&&st!=='paid')?'<button class="tab" data-inv-void>Void</button>':'')
      +'</div>'+textedNote+'</div>';
  }
  return '<div class="row2" style="margin-top:6px">'
      +'<div><label>Job price ($)</label><input type="number" step="0.01" min="0" data-of="price" value="'+eA(price)+'" placeholder="e.g. 400"></div>'
      +'<div><label>Charge</label><select data-of="charge_type">'+sel+'</select></div>'
      +'<div><label>Amount to invoice ($)</label><input type="number" step="0.01" min="0" data-of="amount_due" value="'+eA(amt)+'" placeholder="auto"></div>'
    +'</div>'
    +summary
    +'<button class="btn" data-send-invoice style="margin-top:10px">'+(o.invoice_url?'Create new invoice':'Create &amp; email Stripe invoice')+'</button>'
    +invHtml;
}
function recalcAmount(card){
  var ct=card.querySelector('[data-of="charge_type"]').value;
  if(ct==='Custom')return;
  var price=parseFloat(card.querySelector('[data-of="price"]').value)||0;
  var o=ORDERS[card.dataset.id]||{}; var paid=Number(o.paid_total)||0;
  var a;
  if(ct==='Deposit 50%')a=price*0.5; else if(ct==='Deposit 25%')a=price*0.25;
  else if(ct==='Balance remaining')a=Math.max(0,price-paid); else a=price;
  card.querySelector('[data-of="amount_due"]').value=a?a.toFixed(2):'';
}
function bindOrders(){
  [].forEach.call(document.querySelectorAll('#panel .ord'),function(card){
    var id=card.dataset.id; var b=card.querySelector('[data-save-order]');
    var tg=card.querySelector('[data-toggle]'), det=card.querySelector('.ord-detail');
    if(tg)tg.onclick=function(){card.classList.toggle('open');if(det)det.classList.toggle('hidden');};
    var priceEl=card.querySelector('[data-of="price"]'), ctEl=card.querySelector('[data-of="charge_type"]');
    if(priceEl)priceEl.addEventListener('input',function(){recalcAmount(card);});
    if(ctEl)ctEl.addEventListener('change',function(){recalcAmount(card);});
    if(b)b.onclick=async function(){
      b.classList.add('saving');
      var pr=parseFloat(priceEl.value), am=parseFloat(card.querySelector('[data-of="amount_due"]').value);
      var patch={status:card.querySelector('[data-of="status"]').value, notes:card.querySelector('[data-of="notes"]').value,
        price:isNaN(pr)?null:pr, charge_type:ctEl.value, amount_due:isNaN(am)?null:am};
      var r=await sb.from('orders').update(patch).eq('id',id);
      b.classList.remove('saving');
      toast(r.error?('Error: '+r.error.message):'Saved ✓');
    };
    var md=card.querySelector('[data-mark-done]');
    if(md)md.onclick=async function(){md.textContent='…';var r=await sb.from('orders').update({status:'Done'}).eq('id',id);if(r.error){toast('Error: '+r.error.message);md.textContent='✓ Mark Done';}else{toast('Marked Done ✓');renderOrders();}};
    var tl=card.querySelector('[data-text-log]');
    if(tl)tl.onclick=function(){sb.from('orders').update({last_texted:new Date().toISOString()}).eq('id',id).then(function(){});toast('Opening your Messages app…');};
    var bb=card.querySelector('[data-bill-balance]');
    if(bb)bb.onclick=function(){
      card.querySelector('[data-of="charge_type"]').value='Balance remaining';
      card.querySelector('[data-of="amount_due"]').value=bb.dataset.bal;
      var sx=card.querySelector('[data-send-invoice]'); if(sx)sx.click();
    };
    var sendBtn=card.querySelector('[data-send-invoice]');
    if(sendBtn)sendBtn.onclick=async function(){
      var o=ORDERS[id]||{};
      var amount=parseFloat(card.querySelector('[data-of="amount_due"]').value)||0;
      if(!o.email){toast('This customer has no email on file — can’t send an invoice.');return;}
      if(amount<0.5){toast('Enter the price / amount first.');return;}
      if(!confirm('Email a Stripe invoice for $'+amount.toFixed(2)+' to '+o.email+'?'))return;
      sendBtn.disabled=true;var old=sendBtn.innerHTML;sendBtn.textContent='Sending…';
      var pr=parseFloat(priceEl.value);
      var desc=invoiceDesc(o,ctEl.value);
      var res=await callInvoiceFn({action:'create',order_id:id,amount_cents:Math.round(amount*100),email:o.email,name:o.name,description:desc,charge_type:ctEl.value,price:isNaN(pr)?null:pr});
      sendBtn.disabled=false;sendBtn.innerHTML=old;
      if(res&&res.error){toast('Error: '+res.error);return;}
      toast(res.emailed?('Invoice emailed to '+o.email+' ✓'):'Invoice created ✓ — copy the link below to send it');renderOrders();
    };
    var cp=card.querySelector('[data-inv-copy]');
    if(cp)cp.onclick=function(){var u=cp.dataset.url||'';if(navigator.clipboard){navigator.clipboard.writeText(u).then(function(){toast('Payment link copied ✓');},function(){window.prompt('Copy this link:',u);});}else{window.prompt('Copy this link:',u);}};
    var rf=card.querySelector('[data-inv-refresh]');
    if(rf)rf.onclick=async function(){var o=ORDERS[id]||{};rf.textContent='…';var res=await callInvoiceFn({action:'status',order_id:id,invoice_id:o.invoice_id});if(res&&res.error){toast('Error: '+res.error);rf.textContent='Refresh status';}else{toast('Status: '+res.invoice_status);renderOrders();}};
    var vd=card.querySelector('[data-inv-void]');
    if(vd)vd.onclick=async function(){var o=ORDERS[id]||{};if(!confirm('Void this invoice? The customer will no longer be able to pay it.'))return;var res=await callInvoiceFn({action:'void',order_id:id,invoice_id:o.invoice_id});if(res&&res.error){toast('Error: '+res.error);}else{toast('Invoice voided');renderOrders();}};
  });
}

// auto-login if session exists
sb.auth.getSession().then(function(r){if(r.data&&r.data.session)showDash();});
</script>
</body>
</html>
